<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Il mio golf — Accesso</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-green-900 min-h-screen flex items-center justify-center px-4">

  <div class="w-full max-w-sm">
    <!-- Logo / titolo -->
    <div class="text-center mb-8">
      <div class="text-5xl mb-3">⛳</div>
      <h1 class="text-3xl font-bold text-white">Il mio golf</h1>
      <p class="text-green-300 mt-1 text-sm">Accedi al tuo cruscotto personale</p>
    </div>

    <!-- Form login -->
    <div class="bg-white rounded-2xl shadow-xl p-8">
      {% if error %}
      <div class="mb-5 bg-red-50 border border-red-200 text-red-700 rounded-lg px-4 py-3 text-sm">
        {{ error }}
      </div>
      {% endif %}

      <form method="POST" action="/login" class="space-y-5">
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1.5" for="email">Email</label>
          <input id="email" name="email" type="email" required autocomplete="email"
                 class="w-full border border-gray-300 rounded-xl px-4 py-3 text-base
                        focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent
                        placeholder-gray-400"
                 placeholder="la-tua@email.com">
        </div>

        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1.5" for="password">Password</label>
          <input id="password" name="password" type="password" required autocomplete="current-password"
                 class="w-full border border-gray-300 rounded-xl px-4 py-3 text-base
                        focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent
                        placeholder-gray-400"
                 placeholder="••••••••">
        </div>

        <button type="submit"
                class="w-full bg-green-700 hover:bg-green-600 active:bg-green-800
                       text-white font-bold py-3.5 rounded-xl transition-colors text-base
                       touch-manipulation">
          Accedi
        </button>
      </form>

      <p class="text-center text-xs text-gray-400 mt-6">
        Non hai un account? Contatta l'amministratore.
      </p>
    </div>
  </div>

</body>
</html>
